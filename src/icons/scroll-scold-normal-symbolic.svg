    <!-- bell silhouette -->
    <path d="M8 3.6 C5.7 3.6 4.7 5.4 4.7 8.4 L4.7 9.4 C4.7 10.2 4.2 10.8 3.4 11.3 L3.4 11.9 L12.6 11.9 L12.6 11.3 C11.8 10.8 11.3 10.2 11.3 9.4 L11.3 8.4 C11.3 5.4 10.3 3.6 8 3.6 Z"/>
