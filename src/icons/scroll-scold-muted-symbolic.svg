<svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 16 16">
  <defs>
    <!-- Everything except a diagonal band: geometry-based (clip), so it
         survives the shell's symbolic fill-recoloring. -->
    <clipPath id="slashGap" clip-rule="evenodd">
      <path clip-rule="evenodd" fill-rule="evenodd"
            d="M0 0 H16 V16 H0 Z M2.2 12.8 L12.8 2.2 L14.6 4.0 L4.0 14.6 Z"/>
    </clipPath>
  </defs>
  <g fill="#222222">
    <!-- calm bell (no brows), with a gap for the slash -->
    <g clip-path="url(#slashGap)">
      <path d="M8 2.8 C5.7 2.8 4.7 4.6 4.7 7.6 L4.7 8.6 C4.7 9.4 4.2 10.0 3.4 10.5 L3.4 11.1 L12.6 11.1 L12.6 10.5 C11.8 10.0 11.3 9.4 11.3 8.6 L11.3 7.6 C11.3 4.6 10.3 2.8 8 2.8 Z"/>
      <circle cx="8" cy="12.4" r="1.2"/>
    </g>
    <!-- slash -->
    <rect x="1.6" y="7.3" width="12.8" height="1.4" rx="0.7" transform="rotate(-45 8 8)"/>
  </g>
</svg>
