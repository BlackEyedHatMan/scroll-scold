  <!-- angry face -->
  <path d="M23.5 23.5 29 26.5" stroke="#7c2d12" stroke-width="3" stroke-linecap="round" fill="none"/>
  <path d="M40.5 23.5 35 26.5" stroke="#7c2d12" stroke-width="3" stroke-linecap="round" fill="none"/>
  <circle cx="26.5" cy="30.5" r="1.9" fill="#7c2d12"/>
